<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Mi Perfil</title>
    
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styless.css">
</head>
<body class="bg-light">

    <header class="navbar sticky-top shadow-sm p-0" style="background-color: var(--azul-uner); height: 70px;">
        <div class="container-fluid d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center ms-3">
                <a class="navbar-brand d-flex align-items-center text-white text-decoration-none ms-2" href="index.html">
                    <div class="bg-white text-primary rounded-circle d-flex justify-content-center align-items-center me-2 shadow-sm" style="width: 45px; height: 45px;">
                        <i class="bi bi-mortarboard-fill fs-4"></i>
                    </div>
                    <span class="fw-bold fs-5 tracking-wide ms-1">SGA</span>
                </a>
                <div class="d-none d-md-block border-start border-light border-opacity-25 ps-3 py-1">
                    <h1 class="h6 text-white m-0 fw-semibold" style="letter-spacing: 0.5px;">Sistema de Gestión Académica</h1>
                </div>
            </div>
            
            <div class="nav-item dropdown me-3" style="list-style: none;">
                <a class="nav-link dropdown-toggle d-flex align-items-center text-white text-decoration-none" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="text-end me-2 d-none d-sm-block">
                        <span class="fw-medium small" id="nombreUsuarioNavbar">Cargando...</span>
                    </div>
                    <div class="bg-white bg-opacity-10 p-2 rounded-circle" style="transition: all 0.3s ease;">
                        <i class="bi bi-person-fill text-white fs-5"></i>
                    </div>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 mt-2" aria-labelledby="userDropdown">
                    <li><a class="dropdown-item py-2 text-secondary small fw-bold" href="perfil.html"><i class="bi bi-person-gear me-2"></i>Mi Perfil</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item py-2 text-danger small fw-bold" href="#" id="btnCerrarSesion"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar vh-100 p-0 shadow">
                <div class="position-sticky pt-4">
                    <ul class="nav flex-column px-3">
                        <li class="nav-item mb-2">
                            <a class="nav-link text-secondary py-2" href="index.html">
                                <i class="bi bi-speedometer2 me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-secondary py-2" href="estudiantes.html">
                                <i class="bi bi-people me-2"></i> Estudiantes
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-secondary py-2" href="cursos.html">
                                <i class="bi bi-journal-bookmark me-2"></i> Cursos
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-secondary py-2" href="inscripciones.html">
                                <i class="bi bi-clipboard-check me-2"></i> Inscripciones
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">
                
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6">
                        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                            
                            <div class="bg-primary p-5 text-center position-relative">
                                <div class="position-absolute top-100 start-50 translate-middle">
                                    <div class="bg-white p-1 rounded-circle shadow">
                                        <img id="imgPerfilCentro" src="https://ui-avatars.com/api/?name=User&background=0d6efd&color=fff&size=128" alt="Foto de Perfil" class="rounded-circle" style="width: 100px; height: 100px; object-fit: cover;">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="card-body pt-5 mt-4 text-center pb-5">
                                <h3 class="fw-bold mb-1 text-dark" id="perfilNombrePrincipal">Cargando...</h3>
                                <p class="text-muted mb-4">Administrador del Sistema</p>
                                
                                <div class="d-flex justify-content-center gap-3 mb-4">
                                    <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill"><i class="bi bi-shield-check me-1"></i> Cuenta Activa</span>
                                    <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill"><i class="bi bi-key me-1"></i> Permisos Totales</span>
                                </div>

                                <div class="row text-start mt-5 px-4">
                                    <div class="col-12 mb-3">
                                        <label class="small text-muted fw-bold text-uppercase">Correo Electrónico</label>
                                        <div class="d-flex align-items-center border-bottom pb-2 mt-1">
                                            <i class="bi bi-envelope-at text-secondary me-3 fs-5"></i>
                                            <span class="fw-medium text-dark">admin@sga.edu.ar</span>
                                        </div>
                                    </div>
                                    <div class="col-12 mb-3">
                                        <label class="small text-muted fw-bold text-uppercase">Sede Asignada</label>
                                        <div class="d-flex align-items-center border-bottom pb-2 mt-1">
                                            <i class="bi bi-building text-secondary me-3 fs-5"></i>
                                            <span class="fw-medium text-dark">Sede Central</span>
                                        </div>
                                    </div>
                                </div>

                                <button id="btnProximamente" class="btn btn-outline-primary fw-bold mt-4 px-4 rounded-pill">
                                    <i class="bi bi-pencil-square me-2"></i>Editar Datos
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
