<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Iniciar Sesión</title>
    
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styless.css">
</head>

<body class="bg-light"> 
    
    <div class="container">
        <div class="row vh-100 align-items-center justify-content-center">
            
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        
                        <div class="text-center mb-4">
                            <img src="img/logo2.png" alt="Logo SGA" class="img-fluid" style="max-height: 100px;">
                        </div>
                        <h2 class="text-center h4 mb-4 fw-bold">Iniciar Sesión</h2>

                        <form>
                            <div class="mb-3">
                                <label for="usuario" class="form-label small fw-bold">Usuario</label>
                                <input type="text" class="form-control form-control-lg border-2" id="usuario" placeholder="Ej: admin123" required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label small fw-bold">Contraseña</label>
                                <input type="password" class="form-control form-control-lg border-2" id="password" placeholder="••••••••" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3 shadow-sm">
                                    Ingresar al Sistema
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
                
                <p class="text-center text-muted mt-4 small">
                    &copy; 2026 - SGT - GESTION ACADEMICA
                </p>
            </div>

        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
    
</body>
</html>
