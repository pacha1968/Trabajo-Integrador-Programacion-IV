<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Gestion Academica UNER</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Sistema Gestion Cursos</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="cursos.html">Cursos</a></li>
            <li><a href="estudiantes.html" class="active">Estudiantes</a></li>
            <li><a href="inscripciones.html">Inscripciones</a></li>
        </ul>
    </nav>

    <main>
        <div class="main-header-container">
            <h2>Cargar Nuevo Estudiante</h2>
            <a href="index.html" class="btn-volver">Volver al Listado</a>
        </div>

        <section class="form-container">
            <form>
                <div class="form-group">
                    <label>Documento (DNI):</label>
                    <input type="text" placeholder="Sin puntos ni espacios">
                </div>
                <div class="form-group">
                    <label>Apellido:</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" placeholder="ejemplo@correo.com">
                </div>
                <button type="submit" class="btn-guardar">Guardar Estudiante</button>
            </form>
        </section>
    </main>
</body>
</html>
