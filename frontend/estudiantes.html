<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Gestión de Estudiantes</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styless.css">
</head>
<body class="bg-light">

    <header class="navbar sticky-top shadow-sm p-0" style="background-color: var(--azul-uner); height: 70px;">
        <div class="container-fluid d-flex align-items-center">
            <a class="navbar-brand d-flex align-items-center ms-3" href="index.html">
                <img src="img/logo4.png" alt="Logo" height="45" class="bg-white p-2 rounded-3 shadow-sm">
            </a>
            <h1 class="h5 text-white m-0 flex-grow-1 text-center d-none d-md-block fw-bold">Gestión de Estudiantes</h1>
            <div class="d-flex align-items-center me-3">
                <div class="text-white text-end me-2 d-none d-sm-block">
                    <span class="fw-bold">Administrador</span>
                </div>
                <div class="bg-white bg-opacity-10 p-2 rounded-circle">
                    <i class="bi bi-person-fill text-white"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar vh-100 p-0">
                <div class="position-sticky pt-4">
                    <ul class="nav flex-column px-3">
                        <li class="nav-item mb-2">
                            <a class="nav-link text-secondary py-2" href="index.html">
                                <i class="bi bi-speedometer2 me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link active text-white bg-primary rounded-3 py-2" href="estudiantes.html">
                                <i class="bi bi-people me-2"></i> Estudiantes
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-secondary py-2" href="cursos.html">
                                <i class="bi bi-journal-bookmark me-2"></i> Cursos
                            </a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-secondary py-2" href="inscripciones.html">
                                <i class="bi bi-clipboard-check me-2"></i> Inscripciones
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
                    <h2 class="h3 fw-bold">Listado de Alumnos</h2>
                    <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoEstudiante">
                        <i class="bi bi-plus-lg me-"></i> Nuevo Estudiante
                    </button>
                </div>
                <div class="row mb-3">
                    <div class="col-md-4">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" id="inputBusqueda" class="form-control border-start-0" placeholder="Buscar por DNI o Apellido...">
                        </div>
                    </div>
                </div>
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">DNI</th>
                                        <th>Nombre</th>
                                        <th>Apellido</th>
                                        <th>Email</th>
                                        <th>Estado</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-estudiantes">
                                    <tr>
                                        <td class="ps-4 fw-bold">35.123.456</td>
                                        <td>Juan</td>
                                        <td>Pérez</td>
                                        <td>juan.perez@example.com</td>
                                        <td><span class="badge bg-success-subtle text-success rounded-pill">Activo</span></td>
                                        <td class="text-center">
                                            <button class="btn btn-sm btn-outline-secondary border-0"><i class="bi bi-pencil-square"></i></button>
                                            <button class="btn btn-sm btn-outline-danger border-0"><i class="bi bi-trash3"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white py-3 border-top-0 text-center">
                        <nav aria-label="Paginación de cursos">
                            <ul class="pagination pagination-sm justify-content-center m-0">
                                <li class="page-item disabled"><a class="page-link border-0" href="#">Anterior</a></li>
                                <li class="page-item active"><a class="page-link border-0 rounded-circle mx-1" href="#">1</a></li>
                                <li class="page-item"><a class="page-link border-0 rounded-circle mx-1" href="#">2</a></li>
                                <li class="page-item"><a class="page-link border-0 text-primary" href="#">Siguiente</a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="modalNuevoEstudiante" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Agregar Nuevo Alumno</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formNuevoEstudiante">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">DNI</label>
                            <input type="text" class="form-control border-2" id="documento" placeholder="Sin puntos" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label small fw-bold">Nombre</label>
                                <input type="text" class="form-control border-2" id="nombres" required>
                            </div>
                            <div class="col">
                                <label class="form-label small fw-bold">Apellido</label>
                                <input type="text" class="form-control border-2" id="apellido" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email Institucional</label>
                            <input type="email" class="form-control border-2" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Fecha de Nacimiento</label>
                            <input type="date" class="form-control border-2" id="fecha_nacimiento" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary fw-bold py-2">Guardar Estudiante</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/estudiantes.js"></script>
</body>
</html>
